name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/heart-api:latest .

    - name: Push Docker image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/heart-api:latest

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          export KUBECONFIG=~/.kube/config

          echo "Restarting deployment..."
          kubectl rollout restart deployment heart-api-deployment

          echo "Waiting for rollout to complete..."
          kubectl rollout status deployment heart-api-deployment --timeout=180s

          echo "Checking pod status..."
          kubectl get pods -l app=heart-api

          echo "Verifying all pods are Running..."
          kubectl get pods -l app=heart-api | grep -v Running && exit 1 || echo "Deployment successful"