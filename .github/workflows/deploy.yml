name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pytest flake8

    - name: Lint code
      run: |
        flake8 .

    - name: Run tests
      run: |
        pytest tests/ -v

    - name: Train model
      run: |
        PYTHONPATH=. python src/models/train.py
        python src/models/train.py

    - name: Verify model exists
      run: |
        ls -lh *.pkl

    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/heart-api:${{ github.sha }} .

    - name: Push Docker image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/heart-api:${{ github.sha }}

    - name: Deploy to EC2 (use SAME image)
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          export KUBECONFIG=~/.kube/config

          kubectl set image deployment heart-api-deployment \
            heart-api=${{ secrets.DOCKER_USERNAME }}/heart-api:${{ github.sha }}

          kubectl rollout status deployment heart-api-deployment --timeout=180s
          kubectl wait --for=condition=ready pod -l app=heart-api --timeout=120s

          echo "Deployment successful!!"