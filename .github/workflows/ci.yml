name: ML Pipeline CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pytest flake8

    - name: Lint code
      run: |
        flake8 src

    - name: Run tests
      run: |
        pytest

    - name: Train model
      run: |
        PYTHONPATH=. python src/models/train.py