apiVersion: apps/v1
kind: Deployment
metadata:
  name: heart-api-deployment
spec:
  replicas: 1

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0

  selector:
    matchLabels:
      app: heart-api
  template:
    metadata:
      labels:
        app: heart-api
    spec:
      containers:
      - name: heart-api
        image: shanmathysanjay/heart-api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000

        resources:
          requests:
            memory: "200Mi"
          limits:
            memory: "400Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: heart-api-service
spec:
  type: ClusterIP  
  selector:
    app: heart-api
  ports:
    - port: 80
      targetPort: 8000