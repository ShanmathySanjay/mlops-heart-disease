apiVersion: apps/v1
kind: Deployment
metadata:
  name: heart-api-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: heart-api
  template:
    metadata:
      labels:
        app: heart-api
    spec:
      containers:
      - name: heart-api
        image: shanmathysanjay/heart-api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000

---
apiVersion: v1
kind: Service
metadata:
  name: heart-api-service
spec:
  type: NodePort
  selector:
    app: heart-api
  ports:
    - port: 80
      targetPort: 8000
      nodePort: 30007